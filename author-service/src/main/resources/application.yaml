server:
  port: ${SERVER_PORT}

spring:
  application:
    name: author-microservice

  datasource:
    url: ${DATASOURCE_URL}
    username: ${USER_DB}
    password: ${PASSWORD_DB}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:7080/realms/books/protocol/openid-connect/certs

eureka:
  instance:
    preferIpAddress: true
    instanceId: ${spring.application.name}:${random.value}
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: "${EUREKA_SERVER_URL}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    com.inventory: DEBUG
    org.springframework.cloud.consul: DEBUG

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Author Microservice for book-dictionary-microservices

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html