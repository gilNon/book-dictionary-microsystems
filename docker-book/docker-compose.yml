
services:
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: changemeuser
      MINIO_ROOT_PASSWORD: changemepass

  postgres-author:
    image: postgres:16
    container_name: postgres-author
    restart: unless-stopped

    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: developer
      POSTGRES_DB: author

    ports:
      - "5433:5432"

    volumes:
      - postgres_author_data:/var/lib/postgresql/data
      - ./init/author:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d author"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-book:
    image: postgres:16
    container_name: postgres-book
    restart: unless-stopped

    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: developer
      POSTGRES_DB: book

    ports:
      - "5434:5432"

    volumes:
      - postgres_book_data:/var/lib/postgresql/data
      - ./init/book:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U developer -d book" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_author_data:
  postgres_book_data:
  data-minio: