server:
  port: ${SERVER_PORT}

spring:
  application:
    name: book-microservice

  datasource:
    url: ${DATASOURCE_URL}
    username: ${USER_DB}
    password: ${PASSWORD_DB}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

eureka:
  instance:
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: "${EUREKA_SERVER_URL}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    com.inventory: DEBUG
    org.springframework.cloud.consul: DEBUG

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Book Microservice for orders-microservices
